<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Город</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a1a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            background: #1a3a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== КАРТА ===== */
        .ground-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: #2b5e2b;
        }

        .ground-area {
            width: 2000px;
            height: 2000px;
            position: relative;
            background-image: url('https://s10.iimage.su/s/08/gexzL1Xx1Hcz5JEPkZbzDdQBR7WXVto8AcCNCTtKK.webp');
            background-size: 400px 400px;
            background-repeat: repeat;
            cursor: crosshair;
        }

        .buildings-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .building {
            position: absolute;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 12px 8px rgba(0, 0, 0, 0.5));
            transition: transform 0.2s;
            z-index: 10;
        }

        .building:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .building img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .building.mine {
            filter: drop-shadow(0 0 15px gold) drop-shadow(0 12px 8px rgba(0, 0, 0, 0.5));
        }

        /* ===== КНОПКА ДОБАВЛЕНИЯ (ДЛЯ АДМИНА) ===== */
        .admin-add-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: gold;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #1a2a1a;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            z-index: 100;
            border: 3px solid white;
        }

        /* ===== КАРТОЧКА ДОМА ===== */
        .info-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(20, 30, 25, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            color: white;
            border: 2px solid gold;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            z-index: 200;
            transform: translateY(120%);
            transition: transform 0.3s ease;
            max-width: 400px;
            margin: 0 auto;
        }

        .info-card.show {
            transform: translateY(0);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(145deg, #f1c40f, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #1a2a1a;
            overflow: hidden;
            border: 3px solid gold;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username {
            font-size: 22px;
            font-weight: 700;
            color: gold;
            margin-bottom: 5px;
        }

        .description {
            font-size: 16px;
            line-height: 1.5;
            color: #eee;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            white-space: pre-wrap;
        }

        .description-edit {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 15px;
            color: white;
            font-size: 16px;
            margin: 15px 0;
            resize: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button {
            flex: 1;
            background: gold;
            border: none;
            padding: 15px;
            border-radius: 30px;
            color: #1a2a1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }

        .button.delete {
            background: #ff4444;
            color: white;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
        }

        /* ===== МОДАЛКА ДОБАВЛЕНИЯ ===== */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #1a2a1a;
            border: 3px solid gold;
            border-radius: 40px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 24px;
            color: gold;
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.7);
            border: 2px solid gold;
            border-radius: 16px;
            overflow: hidden;
            z-index: 50;
        }

        .minimap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Мини-карта -->
        <div class="minimap">
            <canvas id="minimapCanvas" width="100" height="100"></canvas>
        </div>

        <!-- Кнопка добавления дома (только для админа) -->
        <div class="admin-add-btn" id="addHouseBtn" style="display: none;">➕</div>

        <!-- Карточка дома -->
        <div class="info-card" id="infoCard">
            <div class="close-btn" id="closeCardBtn">&times;</div>
            <div class="user-row">
                <div class="avatar" id="avatar">👤</div>
                <div>
                    <div class="username" id="username">@username</div>
                    <div id="isMine" style="color: gold; font-size: 14px;"></div>
                </div>
            </div>
            
            <div id="descriptionView">
                <div class="description" id="description">Описание отсутствует</div>
            </div>
            
            <div id="descriptionEdit" style="display: none;">
                <textarea class="description-edit" id="descriptionInput" rows="3"></textarea>
                <div class="button-group">
                    <div class="button" id="saveDescriptionBtn">💾 Сохранить</div>
                    <div class="button delete" id="deleteDescriptionBtn">🗑️ Удалить</div>
                </div>
            </div>
            
            <div class="button-group" id="actionButtons">
                <div class="button" id="editDescriptionBtn">✏️ Редактировать</div>
                <div class="button" id="closeInfoBtn">Закрыть</div>
            </div>
        </div>

        <!-- Модалка добавления дома -->
        <div class="modal" id="addHouseModal">
            <div class="modal-content">
                <div class="modal-title">🏠 Добавить дом</div>
                <input type="text" class="modal-input" id="newUsername" placeholder="@username">
                <div class="button-group">
                    <div class="button" id="confirmAddBtn">Добавить</div>
                    <div class="button delete" id="cancelAddBtn">Отмена</div>
                </div>
            </div>
        </div>

        <!-- Карта -->
        <div class="ground-wrapper" id="groundWrapper">
            <div class="ground-area" id="ground">
                <div class="buildings-layer" id="buildingsLayer"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userId = tg.initDataUnsafe?.user?.id;
        const isAdmin = userId === 896706118;

        // Элементы
        const groundWrapper = document.getElementById('groundWrapper');
        const ground = document.getElementById('ground');
        const buildingsLayer = document.getElementById('buildingsLayer');
        const minimapCanvas = document.getElementById('minimapCanvas');
        const ctx = minimapCanvas.getContext('2d');
        const infoCard = document.getElementById('infoCard');
        const closeCardBtn = document.getElementById('closeCardBtn');
        const avatar = document.getElementById('avatar');
        const usernameSpan = document.getElementById('username');
        const description = document.getElementById('description');
        const descriptionView = document.getElementById('descriptionView');
        const descriptionEdit = document.getElementById('descriptionEdit');
        const descriptionInput = document.getElementById('descriptionInput');
        const isMineSpan = document.getElementById('isMine');
        const editDescriptionBtn = document.getElementById('editDescriptionBtn');
        const saveDescriptionBtn = document.getElementById('saveDescriptionBtn');
        const deleteDescriptionBtn = document.getElementById('deleteDescriptionBtn');
        const closeInfoBtn = document.getElementById('closeInfoBtn');
        const actionButtons = document.getElementById('actionButtons');
        const addHouseBtn = document.getElementById('addHouseBtn');
        const addHouseModal = document.getElementById('addHouseModal');
        const newUsername = document.getElementById('newUsername');
        const confirmAddBtn = document.getElementById('confirmAddBtn');
        const cancelAddBtn = document.getElementById('cancelAddBtn');

        // Данные
        let houses = [];
        let currentHouse = null;
        let avatarsCache = {};

        // Показываем кнопку добавления только админу
        if (isAdmin) {
            addHouseBtn.style.display = 'flex';
        }

        // ТВОИ 5 ДОМОВ
        const houseImages = [
            'https://s10.iimage.su/s/08/gb66IX5xq3hmjyryf1yrgXjGv2VNYVdTmDEcwB0s3.png',
            'https://s10.iimage.su/s/08/gv8fZHTxrANqbnPzfU0Nufmgstqg6vSr58eKb48B1.png',
            'https://s10.iimage.su/s/08/gtwHpmuxcpDzdBWpy2tC8b7aBSPTyNrEtCdUTHVBC.png',
            'https://s10.iimage.su/s/08/gjiB7D2xq9Zv6YRrb6HnKsSO6ZdFm9QAm2J0690Qf.png',
            'https://s10.iimage.su/s/08/gtSjpVOxYCH3tRmN4dmRMaTU6uASXnutoywRVuYU4.png'
        ];

        // Загрузка домов
        function loadHouses() {
            tg.sendData(JSON.stringify({ action: 'get_houses' }));
        }

        // Обработка ответов
        tg.onEvent('message', function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if (data.houses) {
                    renderHouses(data.houses);
                }
                else if (data.photo_url) {
                    if (data.user_id) {
                        avatarsCache[data.user_id] = data.photo_url;
                        if (currentHouse?.user_id === data.user_id) {
                            showAvatar(data.photo_url);
                        }
                    }
                }
                else if (data.success && currentHouse) {
                    // Обновляем данные
                    loadHouses();
                    infoCard.classList.remove('show');
                }
                else if (data.error) {
                    alert('Ошибка: ' + data.error);
                }
            } catch (e) {}
        });

        // Отрисовка домов
        function renderHouses(housesData) {
            houses = housesData;
            buildingsLayer.innerHTML = '';
            
            houses.forEach(house => {
                const buildingDiv = document.createElement('div');
                buildingDiv.className = 'building';
                if (house.user_id === userId) {
                    buildingDiv.classList.add('mine');
                }
                buildingDiv.style.left = house.x + '%';
                buildingDiv.style.top = house.y + '%';
                buildingDiv.setAttribute('data-user', house.user_id);
                
                const img = document.createElement('img');
                img.src = houseImages[(house.type-1) % houseImages.length];
                img.alt = house.username;
                
                buildingDiv.appendChild(img);
                
                buildingDiv.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showHouseInfo(house);
                });
                
                buildingsLayer.appendChild(buildingDiv);
            });
            
            updateMinimap();
        }

        // Показать информацию о доме
        function showHouseInfo(house) {
            currentHouse = house;
            usernameSpan.textContent = '@' + (house.username || 'unknown');
            description.textContent = house.description || 'Описание отсутствует';
            descriptionInput.value = house.description || '';
            
            const isMine = house.user_id === userId;
            isMineSpan.textContent = isMine ? '🏠 Это ваш дом' : '';
            
            // Показываем кнопки в зависимости от владельца
            if (isMine) {
                actionButtons.style.display = 'flex';
                editDescriptionBtn.style.display = 'block';
            } else {
                actionButtons.style.display = 'flex';
                editDescriptionBtn.style.display = 'none';
            }
            
            descriptionView.style.display = 'block';
            descriptionEdit.style.display = 'none';
            
            // Аватарка
            avatar.innerHTML = '<span>' + (house.first_name?.charAt(0) || house.username?.charAt(0) || '👤') + '</span>';
            if (avatarsCache[house.user_id]) {
                showAvatar(avatarsCache[house.user_id]);
            } else {
                tg.sendData(JSON.stringify({ 
                    action: 'get_photo', 
                    user_id: house.user_id 
                }));
            }
            
            infoCard.classList.add('show');
        }

        function showAvatar(url) {
            avatar.innerHTML = `<img src="${url}" onerror="this.style.display='none'">`;
        }

        // Редактирование описания
        editDescriptionBtn.addEventListener('click', function() {
            descriptionView.style.display = 'none';
            descriptionEdit.style.display = 'block';
            actionButtons.style.display = 'none';
        });

        saveDescriptionBtn.addEventListener('click', function() {
            const newDesc = descriptionInput.value;
            tg.sendData(JSON.stringify({ 
                action: 'update_description', 
                description: newDesc 
            }));
        });

        deleteDescriptionBtn.addEventListener('click', function() {
            if (confirm('Удалить описание?')) {
                tg.sendData(JSON.stringify({ action: 'delete_description' }));
            }
        });

        closeCardBtn.addEventListener('click', function() {
            infoCard.classList.remove('show');
        });

        closeInfoBtn.addEventListener('click', function() {
            infoCard.classList.remove('show');
        });

        // Добавление дома (админ)
        addHouseBtn.addEventListener('click', function() {
            addHouseModal.classList.add('show');
        });

        confirmAddBtn.addEventListener('click', function() {
            const username = newUsername.value.trim();
            if (username) {
                tg.sendData(JSON.stringify({ 
                    action: 'add_house', 
                    username: username 
                }));
                addHouseModal.classList.remove('show');
                newUsername.value = '';
            }
        });

        cancelAddBtn.addEventListener('click', function() {
            addHouseModal.classList.remove('show');
            newUsername.value = '';
        });

        // Мини-карта
        function updateMinimap() {
            ctx.clearRect(0, 0, 100, 100);
            
            ctx.fillStyle = '#3a7e3a';
            ctx.fillRect(0, 0, 100, 100);
            
            houses.forEach(house => {
                ctx.fillStyle = house.user_id === userId ? 'gold' : '#f1c40f';
                ctx.beginPath();
                ctx.arc(house.x, house.y, 3, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
            
            const scrollLeft = groundWrapper.scrollLeft;
            const scrollTop = groundWrapper.scrollTop;
            const viewW = (groundWrapper.clientWidth / 2000) * 100;
            const viewH = (groundWrapper.clientHeight / 2000) * 100;
            const viewX = (scrollLeft / 2000) * 100;
            const viewY = (scrollTop / 2000) * 100;
            
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(viewX, viewY, viewW, viewH);
        }

        groundWrapper.addEventListener('scroll', updateMinimap);
        window.addEventListener('resize', updateMinimap);

        // Загружаем дома
        loadHouses();
    </script>
</body>
</html>
